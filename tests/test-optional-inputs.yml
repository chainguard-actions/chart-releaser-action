name: Test optional inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      CR_TOKEN: fake-token-not-needed-for-install-only
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          install_only: "true"
          config: .cr-config.yaml
          skip_packaging: "true"
          skip_existing: "true"
          skip_upload: "true"
          pages_branch: gh-pages
          version: v1.7.0
      - name: Assert cr binary was installed
        run: |
          echo "Checking if cr binary is available..."
          if ! command -v cr &>/dev/null; then
            echo "FAIL: cr binary not found in PATH"
            exit 1
          fi
          echo "PASS: cr binary is available"
